<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a14">
<meta name="robots" content="noindex, nofollow">
<title>Anuario 2026 — Libro Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a14;
    --ink: #e8e6e0;
    --ink-soft: rgba(232, 230, 224, 0.6);
    --ink-faint: rgba(232, 230, 224, 0.3);
    --accent: #d4a574;
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    height: 100vh;
    height: 100dvh;
    background:
      radial-gradient(ellipse 55vw 55vh at 12% 22%, rgba(60, 45, 105, 0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60vw 55vh at 88% 82%, rgba(90, 40, 55, 0.13) 0%, transparent 60%),
      radial-gradient(ellipse 70vw 50vh at 50% 55%, rgba(35, 55, 100, 0.11) 0%, transparent 65%),
      linear-gradient(165deg, #0b0b1a 0%, #05050d 100%);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.9 0 0 0 0 0.9 0 0 0 0 0.85 0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    pointer-events: none;
    opacity: 0.3;
    z-index: 1;
    mix-blend-mode: overlay;
  }
  body::after {
    content: '';
    position: fixed;
    inset: -20%;
    z-index: 0;
    pointer-events: none;
    background: radial-gradient(ellipse 60vw 50vh at center, rgba(80, 60, 140, 0.12) 0%, transparent 65%);
    filter: blur(50px);
    animation: aura-drift 35s ease-in-out infinite alternate;
  }
  @keyframes aura-drift {
    0%   { transform: translate(-12%, -8%) scale(1); }
    50%  { transform: translate(8%, -4%) scale(1.08); }
    100% { transform: translate(10%, 10%) scale(0.96); }
  }

  /* ============ HEADER ============ */
  header {
    position: relative;
    z-index: 3;
    padding: max(18px, env(safe-area-inset-top)) 24px 14px;
    text-align: center;
    flex-shrink: 0;
  }
  header .eyebrow {
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 500;
  }
  header .title {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(22px, 4vw, 28px);
    margin-top: 4px;
    letter-spacing: -0.01em;
  }
  header .title em {
    font-style: italic;
    font-weight: 300;
    color: var(--accent);
  }

  /* ============ BOOK CONTAINER ============ */
  main {
    position: relative;
    z-index: 3;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    min-height: 0;
  }
  .book-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .book-wrap::before {
    /* Soft ambient glow under the book */
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90%; height: 80%;
    background: radial-gradient(ellipse at center, rgba(212, 165, 116, 0.08) 0%, transparent 60%);
    filter: blur(40px);
    z-index: -1;
    pointer-events: none;
  }
  #book {
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    border-radius: 4px;
  }
  /* Loader visible mientras cargan las imágenes */
  .loader {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    pointer-events: none;
    transition: opacity 0.6s var(--ease);
  }
  .loader.hidden { opacity: 0; }
  .loader-text {
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-soft);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 0.9; }
  }

  /* ============ FOOTER (controls) ============ */
  footer {
    position: relative;
    z-index: 3;
    padding: 12px 24px max(18px, env(safe-area-inset-bottom));
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    flex-shrink: 0;
  }
  .nav-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-family: inherit;
    line-height: 1;
    padding: 0;
    transition: all 0.2s var(--ease);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .nav-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.18);
    transform: translateY(-1px);
  }
  .nav-btn:active { transform: translateY(0) scale(0.96); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .nav-btn .ic { margin-top: -2px; }

  .counter {
    min-width: 80px;
    text-align: center;
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }
  .counter em {
    font-style: italic;
    color: var(--ink);
    font-weight: 400;
  }

  /* ============ STPAGEFLIP OVERRIDES ============ */
  .stf__parent { user-select: none; }
  .stf__block { background: transparent !important; }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Universidad · Anuario</div>
  <div class="title">Generación <em>2026</em></div>
</header>

<main>
  <div class="book-wrap">
    <div id="book"></div>
    <div class="loader" id="loader"><span class="loader-text">Cargando libro</span></div>
  </div>
</main>

<footer>
  <button class="nav-btn" id="prevBtn" aria-label="Anterior" disabled><span class="ic">‹</span></button>
  <div class="counter"><em id="pageCurrent">1</em> / <span id="pageTotal">—</span></div>
  <button class="nav-btn" id="nextBtn" aria-label="Siguiente"><span class="ic">›</span></button>
</footer>

<script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
  const TOTAL_PAGES = 118;
  const ASPECT_RATIO = 0.861; // ancho / alto

  // Construir array de URLs de las páginas
  const pages = [];
  for (let i = 1; i <= TOTAL_PAGES; i++) {
    pages.push(`pages/page-${String(i).padStart(3, '0')}.jpg`);
  }

  const bookEl = document.getElementById('book');
  const loader = document.getElementById('loader');
  const counter = document.getElementById('pageCurrent');
  const totalEl = document.getElementById('pageTotal');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  totalEl.textContent = TOTAL_PAGES;

  // Calcular bounds del libro respetando el viewport real (header + footer + padding)
  function computeBounds() {
    const headerH = document.querySelector('header').offsetHeight;
    const footerH = document.querySelector('footer').offsetHeight;
    const vPadding = 28;
    const availH = Math.max(window.innerHeight - headerH - footerH - vPadding, 340);
    const availW = Math.max(window.innerWidth - 24, 260);
    // En desktop ancho: el libro muestra spread (2 páginas), maxWidth es POR PÁGINA
    // En mobile: una sola página, maxWidth es el ancho total disponible
    const isSpread = availW >= 760;
    const maxW = isSpread ? Math.floor(availW / 2) - 8 : availW;
    return { availH, availW, maxW, isSpread };
  }

  const bounds = computeBounds();

  const pageFlip = new St.PageFlip(bookEl, {
    width: Math.min(420, bounds.maxW),
    height: Math.min(488, bounds.availH),
    size: 'stretch',
    minWidth: 240,
    maxWidth: bounds.maxW,
    minHeight: 320,
    maxHeight: bounds.availH,
    maxShadowOpacity: 0.5,
    showCover: true,
    mobileScrollSupport: false,
    usePortrait: true,
    drawShadow: true,
    flippingTime: 750,
    swipeDistance: 25,
    autoSize: true,
  });

  pageFlip.loadFromImages(pages);

  pageFlip.on('flip', (e) => {
    const current = e.data + 1;
    counter.textContent = current;
    prevBtn.disabled = current <= 1;
    nextBtn.disabled = current >= TOTAL_PAGES;
  });

  pageFlip.on('init', () => {
    loader.classList.add('hidden');
  });

  prevBtn.addEventListener('click', () => pageFlip.flipPrev());
  nextBtn.addEventListener('click', () => pageFlip.flipNext());

  // Teclas izquierda/derecha
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') pageFlip.flipPrev();
    else if (e.key === 'ArrowRight') pageFlip.flipNext();
  });
</script>
</body>
</html>
